<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Amor da Minha Vida</title>

    <link rel="stylesheet" href="style-index.css">

    <style>
        
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="content">
        <div class="photo-container"> 
            <img src="imagens/foto-1.png" alt="Nossa Foto 1" class="floating-photo"> 
            <img src="imagens/foto-2.png" alt="Nossa Foto 2" class="floating-photo photo-2">
        </div> 

        <h1>Meu amor...</h1>
        <p> 
            Pensei numa declaração de amor.<br>
            Pensei escrever uma declaração de amor.<br>
            Lembrei viver uma declaração de amor.<br>
            Se eu pudesse, dizia tudo sem tropeçar.<br>
            Mas o amor, em mim, nasce antes da palavra.<br>
            Por isso deixo o verso falar: Eu te escolho. Sempre!
            <h1>Amo amar você!</h1>
        </p> 
    </div>

    <div class="audio-control" onclick="togglePlay()">Tocar nossa música ❤️</div>

    <audio id="myAudio" loop>
        <source src="midia/meu-amor-e-a-louça.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('myAudio');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let hearts = [];

        function togglePlay() {
            const btn = document.querySelector('.audio-control');
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "Tocando... 🎵";
            } else {
                audio.pause();
                btn.innerHTML = "Pausado ⏸️";
            }
        }

        class Heart {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 15 + 8; // Corações um pouco maiores
                this.speed = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.swing = Math.random() * 2;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = "#ff4d4d";
                ctx.beginPath();
                const topCurveHeight = this.size * 0.3;
                ctx.moveTo(this.x, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x, this.y, this.x - this.size / 2, this.y, this.x - this.size / 2, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x - this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + topCurveHeight);
                ctx.bezierCurveTo(this.x + this.size / 2, this.y, this.x, this.y, this.x, this.y + topCurveHeight);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.y -= this.speed;
                this.x += Math.sin(this.y / 40) * this.swing;
                if (this.y < -this.size) {
                    this.reset();
                }
            }
        }

        function init() {
            for (let i = 0; i < 60; i++) { // Aumentei para 60 corações
                hearts.push(new Heart());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
